# MCUboot configuration overlay
# Primary slot is 0xe8000 (928KB) = 232 sectors at 4KB each
CONFIG_BOOT_MAX_IMG_SECTORS=256

# Enable SPI flash for external secondary slot (GD25WB256 on SPI3)
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y

# Match external flash page size to internal flash (4KB)
# so MCUboot sees equal sector counts in primary and secondary slots
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

# Multithreading required by SPI driver
CONFIG_MULTITHREADING=y
