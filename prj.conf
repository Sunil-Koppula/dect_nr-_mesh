CONFIG_NRF_MODEM_LIB=y

CONFIG_MODEM_ANTENNA=n

CONFIG_NRF_MODEM_LINK_BINARY_DECT_PHY=y
CONFIG_HWINFO=y

CONFIG_LOG=y

CONFIG_CARRIER=1711
CONFIG_TX_POWER=13

# Flash / NVS for persistent paired device storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# Random number generator (needed for pairing)
CONFIG_ENTROPY_GENERATOR=y

# GPIO for button (factory reset)
CONFIG_GPIO=y
CONFIG_DK_LIBRARY=y

# Reboot support
CONFIG_REBOOT=y

# System heap for sensor TX buffers (large data RX uses dedicated K_HEAP)
CONFIG_HEAP_MEM_POOL_SIZE=28672
