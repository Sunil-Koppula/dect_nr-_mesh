CONFIG_NRF_MODEM_LIB=y

CONFIG_MODEM_ANTENNA=n

CONFIG_NRF_MODEM_LINK_BINARY_DECT_PHY=y
CONFIG_HWINFO=y

CONFIG_LOG=y

CONFIG_CARRIER=538
CONFIG_TX_POWER=13

CONFIG_MCS=0

# Flash / NVS on external flash for persistent storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# SPI for ESP-PSRAM64 and external flash
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

# Random number generator (needed for pairing)
CONFIG_ENTROPY_GENERATOR=y

# GPIO for button (factory reset)
CONFIG_GPIO=y
CONFIG_DK_LIBRARY=y

# Reboot support
CONFIG_REBOOT=y

# System heap for sensor TX buffers and anchor relay reads
CONFIG_HEAP_MEM_POOL_SIZE=81920

# Main thread stack (gateway OTA upload + flash operations need more)
CONFIG_MAIN_STACK_SIZE=4096

# UART for DFR0997 LCD display (release UART1 from TF-M secure domain)
CONFIG_SERIAL=y
CONFIG_UART_NRFX=y
CONFIG_TFM_LOG_LEVEL_SILENCE=y

# Logs
CONFIG_RADIO_LOG_LEVEL=1
CONFIG_ANCHOR_LOG_LEVEL=4
CONFIG_GATEWAY_LOG_LEVEL=4
CONFIG_SENSOR_LOG_LEVEL=4
CONFIG_DISPLAY_LOG_LEVEL=4
CONFIG_IDENTITY_LOG_LEVEL=4
CONFIG_LARGE_DATA_LOG_LEVEL=4
CONFIG_MAIN_LOG_LEVEL=4
CONFIG_MESH_LOG_LEVEL=4
CONFIG_NVS_STORE_LOG_LEVEL=4
CONFIG_PSRAM_LOG_LEVEL=4
CONFIG_COMMON_LOG_LEVEL=4
CONFIG_QUEUE_LOG_LEVEL=4

# Console input for AT commands
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETLINE=y

# MCUboot bootloader (OTA update support)
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_STREAM_FLASH=y
CONFIG_PM_OVERRIDE_EXTERNAL_DRIVER_CHECK=y

# MCUmgr SMP server over UART (firmware upload via mcumgr CLI)
CONFIG_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_BASE64=y