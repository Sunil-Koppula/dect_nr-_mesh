CONFIG_NRF_MODEM_LIB=y

CONFIG_MODEM_ANTENNA=n

CONFIG_NRF_MODEM_LINK_BINARY_DECT_PHY=y
CONFIG_HWINFO=y

CONFIG_LOG=y

CONFIG_CARRIER=1711
CONFIG_TX_POWER=13

# Flash / NVS for persistent paired device storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# External SPI flash (GD25WB256) for large data reassembly
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_SFDP_DEVICETREE=y

# Random number generator (needed for pairing)
CONFIG_ENTROPY_GENERATOR=y

# GPIO for button (factory reset)
CONFIG_GPIO=y
CONFIG_DK_LIBRARY=y

# Reboot support
CONFIG_REBOOT=y

# System heap for sensor TX buffers and anchor relay reads
CONFIG_HEAP_MEM_POOL_SIZE=81920
